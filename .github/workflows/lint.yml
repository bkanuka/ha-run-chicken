name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Run only ruff (latest). The lint job doesn't import the project, so
      # avoid a full `uv run` project sync.
      - name: Lint
        run: uvx ruff check .

      - name: Format
        run: uvx ruff format . --check

  ty:
    name: "ty"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          # Pin Python 3.13: orjson (pinned transitively by Home Assistant) has
          # no wheels for 3.14, and building it from sdist fails. requires-python
          # allows >=3.13, so without this uv would pick the newest interpreter.
          python-version: "3.13"

      # ty needs the integration's dependencies to resolve imports, so run it
      # through `uv run` (which syncs the project's .venv first). The version is
      # pinned via the dev dependency group in uv.lock.
      - name: Type check
        run: uv run ty check custom_components/
